<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumo Arcade - 12 Minigames</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎮 Lumo Arcade</h1>
        <p>Escolha um desafio!</p>
        <button id="exit-portal">X</button>
    </header>

    <main class="grid-container">
        <div class="game-item">
            <div class="game-card" data-game="slither">
                <img src="assets/lumo.io.png" alt="Lumo.io">
            </div>
            <span>Lumo.io</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="citybloxx">
                <img src="assets/lumo tower.png" alt="Lumo Tower">
            </div>
            <span>Lumo Tower</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="snake">
                <img src="assets/lumo snake.png" alt="Lumo Snake">
            </div>
            <span>Lumo Snake</span>
        </div>

        <div class="game-item">
            <div class="game-card" data-game="flappy">
                <img src="assets/lumo fly.png" alt="Lumo Fly">
            </div>
            <span>Lumo Fly</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="match3">
                <img src="assets/lumo crush.png" alt="Lumo Crush">
            </div>
            <span>Lumo Crush</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="slice">
                <img src="assets/lumo fusion.png" alt="Lumo fusion">
            </div>
            <span>Lumo fusion</span>
        </div>

        <div class="game-item">
            <div class="game-card" data-game="word">
                <img src="assets/lumo word.png" alt="Lumo Word">
            </div>
            <span>Lumo Word</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="galaxy">
                <img src="assets/lumo galaxy.png" alt="Lumo Galaxy">
            </div>
            <span>Lumo Galaxy</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="memory">
                <img src="assets/lumo memory.png" alt="Lumo Memory">
            </div>
            <span>Lumo Memory</span>
        </div>

        <div class="game-item">
            <div class="game-card" data-game="bubbles">
                <img src="assets/lumo bubbles.png" alt="Lumo Bubbles">
            </div>
            <span>Lumo Bubbles</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="jump">
                <img src="assets/lumo jump.png" alt="Lumo Jump">
            </div>
            <span>Lumo Jump</span>
        </div>
        <div class="game-item">
            <div class="game-card" data-game="simon">
                <img src="assets/lumo remember.png" alt="Lumo Remember">
            </div>
            <span>Lumo Remember</span>
        </div>
    </main>

    <div id="game-overlay" class="hidden">
        <button id="close-game">✖ Sair</button>
        <div id="game-canvas-container">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
