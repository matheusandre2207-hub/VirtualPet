<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4ed401">
    <title>Lumo Virtual Pet</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="game-container">
        <div id="mundo">
            <!-- Banheiro (Cômodo 1) -->
            <div class="cenario" id="banheiro">
                <div class="parede-fundo"></div>
                <div class="chao"></div>

                <!-- Elementos do Banheiro -->
                <div class="chuveiro">
                    <div class="chuveiro-cano"></div>
                    <div class="chuveiro-cabeca"></div>
                </div>
                <div class="armario"></div>
                <div class="toalha-suporte"></div>
                <div class="sabonete-container">
                    <div class="suporte-sabonete"></div>
                    <div id="sabonete" class="sabonete-img"></div>
                </div>
                <div class="pia-container">
                    <div class="pia"></div>
                </div>
            </div>

            <!-- Sala (Cômodo 2) -->
            <div class="cenario" id="sala">
                <div class="parede-fundo"></div>
                <div class="chao"></div>
                
                <!-- Elementos da Sala -->
                <div class="tv"></div>
                <div class="rack"></div>
                <div class="planta"></div>
            </div>

            <!-- Cozinha (Cômodo 3) -->
            <div class="cenario" id="cozinha">
                <div class="parede-fundo"></div>
                <div class="chao"></div>
                <div class="geladeira"></div>
                <div class="fogao"></div>
                <div class="mesa"></div>
                <div id="maca" class="maca-img">🍎</div>
            </div>

            <!-- Quarto (Cômodo 4) -->
            <div class="cenario" id="quarto">
                <div class="parede-fundo"></div>
                <div class="chao"></div>
                <div class="cama"></div>
                <div class="comoda">
                    <div class="abajur" id="abajur"></div>
                </div>
            </div>
        </div>

        <div id="lumo" class="pet">
            <div class="espuma-container"></div>
            <div class="olhos-container">
                <div class="olho" id="olho-esq"></div>
                <div class="olho" id="olho-dir"></div>
            </div>
            <div class="nariz" id="nariz"></div>
            <div class="boca" id="boca"></div>
        </div>

        <div class="status-container">
            <div class="status-pill">
                <div class="status-item" id="fome">🍗</div>
                <div class="status-item" id="energia">⚡</div>
                <div class="status-item" id="higiene">🧼</div>
                <div class="status-item" id="felicidade">💕</div>
            </div>
        </div>

        <div id="sleep-overlay"></div>
        <div class="z-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
