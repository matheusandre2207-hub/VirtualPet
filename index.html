<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" id="theme-color" content="#414141">
    <title>Lumo Virtual Pet</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="game-container">
        <div id="mundo">
            <!-- Banheiro (Cômodo 1) -->
            <div class="cenario" id="banheiro">
                <div class="parede-fundo"></div>
                <div class="chao"></div>

                <!-- Elementos do Banheiro -->
                <div class="chuveiro">
                    <div class="chuveiro-cano"></div>
                    <div class="chuveiro-cabeca"></div>
                </div>
                <div class="armario"></div>
                <div class="toalha-suporte"></div>
                <div class="sabonete-container">
                    <div class="suporte-sabonete"></div>
                    <div id="sabonete" class="sabonete-img"></div>
                </div>
                <div class="pia-container">
                    <div class="pia"></div>
                </div>
            </div>

            <!-- Sala (Cômodo 2) -->
            <div class="cenario" id="sala">
                <div class="parede-fundo"></div>
                <div class="chao"></div>
                
                <!-- Elementos da Sala -->
                <div class="tv"></div>
                <div class="rack"></div>
                <div class="planta"></div>
                <div id="bolinha" class="bolinha"></div>
            </div>

            <!-- Cozinha (Cômodo 3) -->
            <div class="cenario" id="cozinha">
                <div class="parede-fundo"></div>
                <div class="chao"></div>
                <div class="geladeira"></div>
                <div class="fogao"></div>
                <div class="mesa"></div>
                <div class="food-selector">
                    <button class="food-arrow" id="prev-food">&lt;</button>
                    <div id="maca" class="maca-img">🍎</div>
                    <button class="food-arrow" id="next-food">&gt;</button>
                </div>
            </div>

            <!-- Quarto (Cômodo 4) -->
            <div class="cenario" id="quarto">
                <div class="parede-fundo"></div>
                <div class="chao"></div>
                <div class="cama"></div>
                <div class="comoda">
                    <div class="abajur" id="abajur"></div>
                </div>
                <div class="guarda-roupas" id="guarda-roupas"></div>
                <div id="sleep-overlay"></div>
            </div>
        </div>

        <!-- Menu da Loja Lateral -->
        <div id="shop-overlay" class="hidden">
            <div id="shop-panel">
                <div class="shop-header">
                    <h2>Loja</h2>
                    <button id="close-shop">✕</button>
                </div>
                <div id="shop-sections-container">
                    <!-- Preenchido via JS -->
                </div>
            </div>
        </div>

        <div id="lumo-wrapper">
            <div id="lumo" class="pet">
                <div class="pet-corpo-mask">
                    <div class="pet-pattern"></div>
                </div>
                <div class="pet-broto"></div>
                <div class="pet-tshirt"></div>
                <div class="pet-tshirt2"></div>
                <div class="pet-tshirt3"></div>
                <div class="pet-chain"></div>
                <div class="pet-cap"></div>
                <div class="pet-glass"></div>
                <div class="pet-headphones"></div>
                <div class="espuma-container"></div>
                <div class="z-container"></div>
                <div class="olhos-container">
                    <div class="olho-wrapper">
                        <div class="olho" id="olho-esq">
                            <div class="palpebra superior"></div>
                            <div class="palpebra inferior"></div>
                        </div>
                        <div class="sobrancelha" id="sob-esq"></div>
                    </div>
                    <div class="olho-wrapper">
                        <div class="olho" id="olho-dir">
                            <div class="palpebra superior"></div>
                            <div class="palpebra inferior"></div>
                        </div>
                        <div class="sobrancelha" id="sob-dir"></div>
                    </div>
                </div>
                <div class="nariz" id="nariz"></div>
                <div class="boca" id="boca"></div>
            </div>
        </div>

        <div class="status-container">
            <button class="ui-button" id="btn-loja">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
            </button>

            <div class="status-pill">
                <div class="status-item">
                    <div class="icon-container">
                        <img src="assets/preenchimentofome.png" class="icon-fill-img" id="fill-fome">
                        <img src="assets/fome.png" class="icon-outline-img">
                    </div>
                </div>
                <div class="status-item">
                    <div class="icon-container">
                        <img src="assets/preenchimentoenergia.png" class="icon-fill-img" id="fill-energia">
                        <img src="assets/energia.png" class="icon-outline-img">
                    </div>
                </div>
                <div class="status-item">
                    <div class="icon-container">
                        <img src="assets/preenchimentolimpeza.png" class="icon-fill-img" id="fill-limpeza">
                        <img src="assets/limpeza.png" class="icon-outline-img">
                    </div>
                </div>
                <div class="status-item">
                    <div class="icon-container">
                        <img src="assets/preenchimentohumor.png" class="icon-fill-img" id="fill-humor">
                        <img src="assets/humor.png" class="icon-outline-img">
                    </div>
                </div>
            </div>

            <button class="ui-button" id="btn-menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
